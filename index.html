<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بدن ساز</title>
  <link rel="stylesheet" href="assets/fonts/Vazirmatn-font-face.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">بدن <span>ساز</span></div>
      <a class="db-setup-btn" href="https://mhkarami97.ir" target="_blank" title="Database Setup">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="8" cy="4" rx="6" ry="2.5"/>
          <path d="M2 4v3c0 1.38 2.69 2.5 6 2.5s6-1.12 6-2.5V4"/>
          <path d="M2 7v3c0 1.38 2.69 2.5 6 2.5s6-1.12 6-2.5V7"/>
          <path d="M2 10v2c0 1.38 2.69 2.5 6 2.5s6-1.12 6-2.5v-2"/>
        </svg>
        mhkarami97
      </a>
    </div>
    <div class="sidebar-body">
      <!-- Search -->
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="6.5" cy="6.5" r="4.5"/>
          <path d="M10.5 10.5L14 14" stroke-linecap="round"/>
        </svg>
        <input type="search" class="search-box rtl-text" id="search" placeholder="جستجو ..." autocomplete="off" />
        <button class="search-clear" id="search-clear" aria-label="Clear search">×</button>
      </div>

      <!-- Category filter -->
      <div class="filter-section">
        <div class="filter-summary rtl-text">دسته بندی</div>
        <div class="filter-options" id="category-chips"></div>
      </div>

      <!-- Equipment filter -->
      <div class="filter-section">
        <div class="filter-summary rtl-text">تجهیزات</div>
        <div class="filter-options" id="equipment-chips"></div>
      </div>

      <!-- Target filter -->
      <div class="filter-section">
        <div class="filter-summary rtl-text">عضله هدف</div>
        <div class="filter-options" id="target-chips"></div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="results-bar rtl-text">
      <div class="active-filters" id="active-filters"></div>
      <span class="results-count" id="results-count"></span>
    </div>
    <div class="grid-wrapper">
      <div class="exercise-grid" id="exercise-grid"></div>
      <div class="load-sentinel" id="load-sentinel">
        <div class="load-spinner" id="load-spinner"></div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-panel rtl-text" id="modal-panel">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title"></h2>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-media">
      <img class="modal-gif" id="modal-gif" alt="" />
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-muscles" id="modal-muscles"></div>
    <div class="modal-instructions" id="modal-instructions"></div>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
