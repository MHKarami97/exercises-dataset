<!DOCTYPE html>
<html lang="fa">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بدن ساز</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ff4f00" />
  <meta name="description" content="بند ساز" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="بدن ساز" />
  <link rel="icon" type="image/png" href="/assets/icons/favicon-96-96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
  <link rel="shortcut icon" href="/assets/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="/assets/fonts/Vazirmatn-font-face.css" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="manifest" href="/manifest.json" />
</head>

<body>

  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">بدن <span>ساز</span></div>
        <button class="db-setup-btn" id="contact-btn" title="Contact" type="button">
          📞
        </button>
        <a class="db-setup-btn" href="https://mhkarami97.ir" target="_blank" title="Mohammad Hossein Karami">
          mhkarami97
        </a>
      </div>
      <div class="sidebar-body rtl-text">
        <!-- Search -->
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="6.5" cy="6.5" r="4.5" />
            <path d="M10.5 10.5L14 14" stroke-linecap="round" />
          </svg>
          <input type="search" class="search-box rtl-text" id="search" placeholder="جستجو ..." autocomplete="off" />
          <button class="search-clear" id="search-clear" aria-label="Clear search">×</button>
        </div>

        <!-- Category filter -->
        <div class="filter-section">
          <div class="filter-summary rtl-text">دسته بندی</div>
          <div class="filter-options" id="category-chips"></div>
        </div>

        <!-- Equipment filter -->
        <div class="filter-section">
          <div class="filter-summary rtl-text">تجهیزات</div>
          <div class="filter-options" id="equipment-chips"></div>
        </div>

        <!-- Target filter -->
        <div class="filter-section">
          <div class="filter-summary rtl-text">عضله هدف</div>
          <div class="filter-options" id="target-chips"></div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="results-bar rtl-just">
        <div class="active-filters" id="active-filters"></div>
        <span class="results-count" id="results-count"></span>
      </div>
      <div class="grid-wrapper">
        <div class="exercise-grid" id="exercise-grid"></div>
        <div class="load-sentinel" id="load-sentinel">
          <div class="load-spinner" id="load-spinner"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-panel rtl-text" id="modal-panel">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-media">
        <img class="modal-gif" id="modal-gif" alt="" />
      </div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-muscles" id="modal-muscles"></div>
      <div class="modal-instructions" id="modal-instructions"></div>
    </div>
  </div>

  <!-- Contact Form Modal -->
  <div class="contact-overlay" id="contact-overlay" role="dialog" aria-modal="true" aria-labelledby="contact-title">
    <div class="contact-panel rtl-text">
      <div class="contact-header">
        <h2 class="contact-title" id="contact-title">تماس با ما</h2>
        <button class="contact-close" id="contact-close" aria-label="Close">✕</button>
      </div>
      <form class="contact-form" id="contact-form" action="https://formspree.io/f/mpzbwnop" method="POST">
        <div class="contact-field">
          <label for="contact-name">نام</label>
          <input type="text" id="contact-name" name="name" required placeholder="نام خود را وارد کنید" />
        </div>
        <div class="contact-field">
          <label for="contact-email">ایمیل</label>
          <input type="email" id="contact-email" name="email" required placeholder="example@email.com" />
        </div>
        <div class="contact-field">
          <label for="contact-message">پیام</label>
          <textarea id="contact-message" name="message" rows="4" required
            placeholder="پیام خود را بنویسید..."></textarea>
        </div>
        <button type="submit" class="contact-submit">ارسال</button>
        <div class="contact-success" id="contact-success">پیام شما با موفقیت ارسال شد ✅</div>
      </form>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>

</html>
